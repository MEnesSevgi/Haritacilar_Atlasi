<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Haritacılar Atlası</title>
    

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ünlü Haritacılar Atlası</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0705;
        }
        .gis-panel {
            background: rgba(18, 13, 10, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.15);
        }
        .digital-clock {
            font-family: 'Orbitron', sans-serif;
        }
        .leaflet-container {
            background: #0f0b08 !important;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(18, 13, 10, 0.95) !important;
            color: #f1f5f9 !important;
            border: 1px solid rgba(245, 158, 11, 0.4);
            backdrop-filter: blur(8px);
        }
        #live-time-panel, #wiki-panel {
            position: relative;
        }

        /* Responsive Ayarlar */
        @media (max-width: 768px) {
            main {
                flex-direction: column; /* Küçük ekranlarda dikey hizalama */
            }
            #sidebar {
                width: 100%; /* Sidebar tam genişlikte olacak */
                height: auto; /* Yükseklik otomatik ayarlanacak */
            }
            #map {
                width: 100%; /* Harita tam genişlikte olacak */
                height: 400px; /* Mobilde harita yüksekliğini artırdım */
            }
        }
        @media (min-width: 768px) {
            #sidebar {
                width: 50%; /* Büyük ekranlarda yan yana %50 genişlik */
                border-right: 1px solid rgba(245, 158, 11, 0.15);
            }
            #map {
                width: 100%; /* Büyük ekranlarda yan yana %50 genişlik */
                height: 100%; /* Harita yüksekliği tam olacak */
            }
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col justify-between overflow-hidden">

    <header class="w-full px-6 py-3 flex justify-between items-center border-b border-orange-950/40 gis-panel z-50">
        <h1 class="text-md font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500 digital-clock">
            Haritacılar Atlası
        </h1>
        <div class="text-xs text-slate-400 flex items-center space-x-4 font-mono">
            <div> <span id="system-time" class="text-amber-400 digital-clock">00:00:00</span></div>
        </div>
    </header>

    <main class="flex-1 w-full flex items-stretch overflow-hidden">
        
        <section id="sidebar" class="w-full md:w-1/2 border-b md:border-b-0 md:border-r border-orange-950/30 p-4 flex flex-col justify-between gap-4 overflow-y-auto z-40 bg-[#0e0a07]">
            <h2 class="text-sm font-bold tracking-widest text-slate-400 uppercase mb-3"></h2>
            <select id="sehirSelect" onchange="sehirSecildi(this.value)" class="w-full p-3 rounded-lg bg-slate-900/80 border border-slate-800 text-sm text-slate-200 outline-none focus:border-amber-500 transition-all mb-4">
                <option value="">Bir haritacı seçin...</option>
            </select>
            <div id="live-time-panel" class="w-full max-w-full p-4 rounded-xl bg-amber-950/20 border border-amber-500/20 mb-4 hidden">
                <div class="flex justify-between items-center">
                    <span id="selected-zone-name" class="text-sm font-bold text-slate-100">Haritacı Adı</span>
                    <span id="selected-zone-clock" class="digital-clock text-xs font-bold text-amber-400 uppercase tracking-wider"></span>
                </div>
                <div class="text-[10px] mt-2 pt-2 border-t border-orange-950/50 text-slate-400 flex flex-col gap-1">
                    <div class="flex justify-between"><span></span> <b id="selected-zone-string" class="font-mono text-slate-300 italic">--</b></div>
                    <div class="flex justify-between"><span>Coğrafi Koordinat:</span> <b id="selected-zone-coords" class="font-mono text-slate-300">--</b></div>
                </div>
            </div>
            <div id="wiki-panel" class="w-full flex-1 border-t border-orange-950/30 pt-3 overflow-y-auto text-xs line-height-relaxed text-slate-400"></div>
        </section>

        <section class="w-full md:w-1/2 flex flex-col relative">
            <div id="map" class="w-full h-full"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const haritacilar = [
            { "id": 1, "name": "Anaksimandros", "wikiQuery": "Anaksimandros", "region": "Antik Çağ", "lat": 37.5264, "lng": 27.2789, "zone": "Milet (Aydın)", "color": "#FF4D4D", "note": "Dünyanın bilinen ilk ölçekli haritasını çizdiğine inanılan Antik Yunan filozofudur." },
            { "id": 2, "name": "Hekataios", "wikiQuery": "Hekataios_(MÖ_550_doğumlu_tarihçi)", "region": "Antik Çağ", "lat": 37.5300, "lng": 27.2800, "zone": "Milet (Aydın)", "color": "#FF4D4D", "note": "Dünyayı düz, yuvarlak bir disk olarak tasvir eden Ges Periodos adlı eseri yazdı." },
            { "id": 3, "name": "Eratosthenes", "wikiQuery": "Eratosthenes", "region": "Antik Çağ", "lat": 31.2001, "lng": 29.9187, "zone": "İskenderiye", "color": "#FF4D4D", "note": "Dünyanın çevresini %2'lik hata payıyla hesaplayan ilk insandır." },
            { "id": 4, "name": "Batlamyus", "wikiQuery": "Batlamyus", "region": "Antik Çağ", "lat": 31.2050, "lng": 29.9240, "zone": "Mısır (Roma)", "color": "#FF4D4D", "note": "Geographia adlı eseriyle antik dünyanın bilinen 8.000'den fazla yerinin koordinatlarını listeledi." },
            { "id": 5, "name": "Pei Xiu", "wikiQuery": "Pei_Xiu", "region": "Doğu Asya", "lat": 34.6284, "lng": 112.4542, "zone": "Çin (Luoyang)", "color": "#FF4D4D", "note": "Haritalarda kesin ölçüm sağlayan ızgara sistemini formüle eden ilk kişidir." },
            { "id": 6, "name": "İsidorus", "wikiQuery": "Isidorus (Sevilla başpiskoposu)", "region": "Avrupa", "lat": 37.3891, "lng": -5.9845, "zone": "Sevilla (İspanya)", "color": "#FF4D4D", "note": "T-O Haritaları formatının üreticisidir." },
            { "id": 7, "name": "Biruni", "wikiQuery": "Biruni", "region": "Orta Asya", "lat": 41.5576, "lng": 60.6315, "zone": "Harezm", "color": "#FF4D4D", "note": "Dünyanın yarıçapını trigonometri ile hesapladı." },
            { "id": 8, "name": "Kaşgarlı Mahmud", "wikiQuery": "Kaşgarlı_Mahmud", "region": "Orta Asya", "lat": 39.4547, "lng": 75.9891, "zone": "Kaşgar", "color": "#FF4D4D", "note": "İlk Türk dünyası haritasını oluşturdu." },
            { "id": 9, "name": "Muhammed el-İdrisi", "wikiQuery": "Muhammad al-Idrisi", "region": "Akdeniz", "lat": 38.1157, "lng": 13.3615, "zone": "Sicilya", "color": "#FF4D4D", "note": "Orta Çağ'ın en gelişmiş dünya haritasını hazırladı." },
            { "id": 10, "name": "Fra Mauro", "wikiQuery": "Fra_Mauro", "region": "Avrupa", "lat": 45.4408, "lng": 12.3155, "zone": "Venedik", "color": "#4169E1", "note": "Devasa dairesel dünya haritası çizdi." },
            { "id": 11, "name": "Zheng He (Mao Kun)", "wikiQuery": "Zheng_He", "region": "Doğu Asya", "lat": 32.0603, "lng": 118.7969, "zone": "Çin (Nanjing)", "color": "#4169E1", "note": "Deniz seferlerini içeren devasa parşömen." },
            { "id": 12, "name": "Juan de la Cosa", "wikiQuery": "Juan_de_la_Cosa", "region": "Avrupa", "lat": 36.5936, "lng": -6.2294, "zone": "İspanya", "color": "#4169E1", "note": "Amerika'yı gösteren tarihteki ilk haritayı yaptı." },
            { "id": 13, "name": "Martin Waldseemüller", "wikiQuery": "Martin_Waldseemüller", "region": "Avrupa", "lat": 48.2862, "lng": 6.9472, "zone": "Almanya (Saint-Dié)", "color": "#4169E1", "note": "Yeni Dünya'yı ayrı bir kıta olarak gösterdi." },
            { "id": 14, "name": "Piri Reis", "wikiQuery": "Piri_Reis", "region": "Orta Doğu", "lat": 40.4108, "lng": 26.6708, "zone": "Gelibolu (Osmanlı)", "color": "#4169E1", "note": "Atlantik Okyanusu ve Amerika kıyılarının çiziminde büyük başarı yakaladı." },
            { "id": 15, "name": "Diogo Ribeiro", "wikiQuery": "Diogo_Ribeiro", "region": "Avrupa", "lat": 38.7223, "lng": -9.1393, "zone": "Portekiz", "color": "#4169E1", "note": "İlk bilimsel dünya haritasını çizdi." },
            { "id": 16, "name": "Matrakçı Nasuh", "wikiQuery": "Matrakçı_Nasuh", "region": "Orta Doğu", "lat": 41.0082, "lng": 28.9784, "zone": "İstanbul (Osmanlı)", "color": "#4169E1", "note": "Topografik haritacılığın öncüsü oldu." },
            { "id": 17, "name": "Gerardus Mercator", "wikiQuery": "Gerardus_Mercator", "region": "Avrupa", "lat": 51.1928, "lng": 4.1413, "zone": "Flandre (Belçika)", "color": "#2E8B57", "note": "Mercator Projeksiyonu'nu geliştirdi." },
            { "id": 18, "name": "Abraham Ortelius", "wikiQuery": "Abraham_Ortelius", "region": "Avrupa", "lat": 51.2194, "lng": 4.4025, "zone": "Flandre (Belçika)", "color": "#2E8B57", "note": "İlk modern dünya atlasını yayımladı." },
            { "id": 19, "name": "Joan Blaeu", "wikiQuery": "Joan_Blaeu", "region": "Avrupa", "lat": 52.3676, "lng": 4.9041, "zone": "Hollanda", "color": "#2E8B57", "note": "Tarihin en büyük atlasını yayımladı." },
            { "id": 20, "name": "Kâtip Çelebi", "wikiQuery": "Kâtip_Çelebi", "region": "Orta Doğu", "lat": 41.0122, "lng": 28.9760, "zone": "İstanbul (Osmanlı)", "color": "#2E8B57", "note": "Osmanlı'da modern coğrafya dönemini başlattı." },
            { "id": 21, "name": "Giovanni Domenico Cassini", "wikiQuery": "Giovanni Domenico Cassini", "region": "Avrupa", "lat": 48.8566, "lng": 2.3522, "zone": "Fransa (Paris)", "color": "#2E8B57", "note": "Fransa'nın topoğrafya haritasının çıkarılması projesinde çalışmıştır." },
            { "id": 22, "name": "William Smith", "wikiQuery": "William_Smith_(jeolog)", "region": "Avrupa", "lat": 51.5074, "lng": -0.1278, "zone": "İngiltere (Londra)", "color": "#FFA500", "note": "İlk geniş ölçekli jeolojik haritasını yaptı." },
            { "id": 23, "name": "John Snow", "wikiQuery": "John_Snow", "region": "Avrupa", "lat": 51.5133, "lng": -0.1366, "zone": "İngiltere (Londra)", "color": "#FFA500", "note": "Kolera salgınında hastalığın kaynağını harita ile kanıtladı." },
            { "id": 24, "name": "Henry Hudson", "wikiQuery": "Henry_Hudson", "region": "Kuzey Amerika", "lat": 40.7128, "lng": -74.0060, "zone": "New York (ABD)", "color": "#FFA500", "note": "Kuzey Amerika'nın keşfi ve haritalanmasında önemli rol oynadı." },
            { "id": 25, "name": "Ferdinand Magellan", "wikiQuery": "Ferdinand_Magellan", "region": "Dünya", "lat": -15.5926, "lng": -47.9292, "zone": "Portekiz", "color": "#FFA500", "note": "Ferdinand Magellan, dünyanın etrafında ilk deniz yolculuğunu gerçekleştirmiş ve bu yolculuk, dünya coğrafyasının anlaşılmasında devrim niteliğinde bir keşif olmuştur." },
            { "id": 26, "name": "David Rumsey", "wikiQuery": "David_Rumsey", "region": "Amerika", "lat": 38.8833, "lng": -77.0167, "zone": "Washington D.C. (ABD)", "color": "#FFA500", "note": "Tarihi haritalar koleksiyonu ile tanınır." },
        ];

        let harita;
        let markerlar = [];
        const systemTimeEl = document.getElementById('system-time');

        function haritayiKur() {
            harita = L.map('map').setView([20.0, 0.0], 2);
           L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(harita);

            pinleriOlustur();
            selectListesiniDoldur();

            setInterval(zamanMotoru, 1000);
            zamanMotoru();
        }

        function pinleriOlustur() {
            markerlar.forEach(m => harita.removeLayer(m));
            markerlar = [];

            haritacilar.forEach(haritaci => {
                const marker = L.marker([haritaci.lat, haritaci.lng]).addTo(harita);
                marker.bindPopup(`<b>${haritaci.name}</b><br><span> ${haritaci.region}</span><br><span>Not: ${haritaci.note}</span>`);
                marker.haritaciData = haritaci;
                
                marker.on('click', () => {
                    document.getElementById('sehirSelect').value = haritaci.id;
                    merkezOdakla(haritaci);
                });

                markerlar.push(marker);
            });
        }

        function zamanMotoru() {
            const globalNow = new Date();
            systemTimeEl.textContent = globalNow.toLocaleTimeString('tr-TR');
        }

        function merkezOdakla(haritaci) {
            document.getElementById('live-time-panel').classList.remove('hidden');
            document.getElementById('selected-zone-name').textContent = haritaci.name;
            document.getElementById('selected-zone-string').textContent = haritaci.zone;
            document.getElementById('selected-zone-coords').textContent = `${haritaci.lat.toFixed(4)}, ${haritaci.lng.toFixed(4)}`;

            wikiVerisiGetir(haritaci.wikiQuery, haritaci.name, haritaci.region);
        }

        function sehirSecildi(id) {
            if (!id) return;
            const secilen = haritacilar.find(h => h.id == id);
            if (secilen) {
                harita.setView([secilen.lat, secilen.lng], 5);
                const marker = markerlar.find(m => m.haritaciData.id == id);
                if (marker) marker.openPopup();
                merkezOdakla(secilen);
            }
        }

        function selectListesiniDoldur() {
            const selectEl = document.getElementById('sehirSelect');
            selectEl.innerHTML = '<option value="">Bir haritacı seçin...</option>';
            
            haritacilar.forEach(haritaci => {
                const opt = document.createElement('option');
                opt.value = haritaci.id;
                opt.textContent = `${haritaci.name} (${haritaci.region})`;
                selectEl.appendChild(opt);
            });
        }

        // Metni Türkçe'ye çeviren yardımcı fonksiyon (MyMemory Translation API)
        async function turkceyeCevir(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|tr`);
                if (!response.ok) return text;
                const data = await response.json();
                return data.responseData.translatedText || text;
            } catch (error) {
                console.error("Çeviri hatası:", error);
                return text; // Hata durumunda orijinal İngilizce metni döndür
            }
        }

        async function wikiVerisiGetir(query, name, region) {
            const panel = document.getElementById('wiki-panel');
            panel.innerHTML = `<p class="animate-pulse">Veriler Alınıyor...</p>`;
            
            const urlTr = `https://tr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const urlEn = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;

            try {
                let response = await fetch(urlTr);
                let isTranslated = false;
                
                // Eğer Türkçe Wikipedia'da bulunamazsa İngilizceye istek at
                if (!response.ok) {
                    response = await fetch(urlEn);
                    if (!response.ok) throw new Error("İki dilde de bilgi bulunamadı.");
                    isTranslated = true;
                }

                const data = await response.json();

                if (data.extract) {
                    let textContent = data.extract;
                    
                    // Eğer veri İngilizce Wikipedia'dan geldiyse içeriği çevir
                    if (isTranslated) {
                        panel.innerHTML = `<p class="animate-pulse">Türkçe veri bulunamadı, İngilizce içerik Türkçe'ye çevriliyor...</p>`;
                        textContent = await turkceyeCevir(data.extract);
                    }

                    panel.innerHTML = `
                        <h3 class="text-sm font-bold text-amber-400 mb-1">${name}</h3>
                        <span class="text-[10px] text-slate-500 block mb-2">  ${region} ${isTranslated ? '(İngilizce\'den Çevrildi)' : ''}</span>
                        <p class="text-slate-300 leading-relaxed">${textContent}</p>
                        ${data.thumbnail ? `<img src="${data.thumbnail.source}" class="w-full rounded-lg mt-3 max-h-48 object-cover border border-orange-950/30"/>` : ''}
                        <a href="${data.content_urls.desktop.page}" target="_blank" class="text-amber-500 hover:underline mt-3 inline-block font-medium">Detaylar (Wikipedia) →</a>
                    `;
                } else {
                    panel.innerHTML = `<h3>${name}</h3><span>  ${region}</span><p>Detaylar şu anda çekilemedi.</p>`;
                }

            } catch (error) {
                console.error("Veri çekme hatası:", error);
                panel.innerHTML = `
                    <h3>${name}</h3>
                    <span> ${region}</span>
                    <p class="text-red-400/80">Detaylar şu anda çekilemedi veya haritacı bulunamadı.</p>
                `;
            }
        }

        window.onload = haritayiKur;
    </script>
</body>
</html>
    
  </body>
  
</html>
